{% extends "base.html" %}
{% block title %}Resetare parolă — AuthX v2{% endblock %}
{% block content %}
  <h1>Resetare parolă</h1>
  <form method="POST">
    <label>Email</label>
    <input type="email" name="email" required autofocus>
    <button type="submit">Trimite link de resetare</button>
  </form>
  <p class="hint">
    Vei primi un link prin email dacă există un cont asociat. Link-ul expiră în 15 minute.
  </p>
{% endblock %}

{% extends "base.html" %}
{% block title %}Login — AuthX v2{% endblock %}
{% block content %}
  <h1>Login</h1>
  <form method="POST">
    <label>Email</label>
    <input type="email" name="email" required autofocus>
    <label>Parolă</label>
    <input type="password" name="password" required>
    <button type="submit">Autentificare</button>
  </form>
  <p class="hint">
    Ai uitat parola? <a href="{{ url_for('auth.forgot_password') }}">Resetare</a>.
  </p>
{% endblock %}
